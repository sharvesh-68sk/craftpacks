<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MineMod</title>
<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#0f172a;
  color:white;
}
header{
  padding:20px;
  text-align:center;
  background:#020617;
  font-size:24px;
  font-weight:bold;
}
.container{
  padding:20px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:15px;
}
.card{
  background:#111827;
  padding:15px;
  border-radius:10px;
  border:1px solid #1f2937;
}
.card:hover{
  transform:translateY(-3px);
}
.actions{
  text-align:center;
  padding:20px;
}
button{
  padding:12px 20px;
  margin:5px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}
.download{
  background:#22c55e;
  color:black;
}
.clear{
  background:#ef4444;
  color:white;
}
</style>
</head>

<body>

<header>🎮 MineMod Pack Builder</header>

<div class="container" id="mods"></div>

<div class="actions">
<button class="download" onclick="downloadPack()">Download .mrpack</button>
<button class="clear" onclick="clearSelection()">Clear</button>
</div>

<script>
const mods = [
 {name:"Sodium", id:"sodium"},
 {name:"Lithium", id:"lithium"},
 {name:"Iris Shaders", id:"iris"},
 {name:"JourneyMap", id:"journeymap"},
 {name:"JEI", id:"jei"},
 {name:"Create", id:"create"}
];

const container = document.getElementById("mods");

mods.forEach(mod=>{
 const div=document.createElement("div");
 div.className="card";
 div.innerHTML=`
 <label>
 <input type="checkbox" value="${mod.id}">
 ${mod.name}
 </label>
 `;
 container.appendChild(div);
});

function getSelected(){
 return [...document.querySelectorAll("input:checked")]
 .map(el=>el.value);
}

function clearSelection(){
 document.querySelectorAll("input").forEach(el=>el.checked=false);
}

function downloadPack(){
 const selected = getSelected();
 if(selected.length===0){
  alert("Select at least one mod!");
  return;
 }

 const data={
  formatVersion:1,
  game:"minecraft",
  versionId:"MineMod Pack",
  name:"MineMod Pack",
  summary:"Generated with MineMod",
  files:selected.map(m=>({path:`mods/${m}.jar`}))
 };

 const blob = new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
 const url = URL.createObjectURL(blob);

 const a=document.createElement("a");
 a.href=url;
 a.download="MineMod-Pack.mrpack";
 a.click();

 URL.revokeObjectURL(url);
}
</script>

</body>
</html>
